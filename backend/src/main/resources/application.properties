spring.datasource.url=jdbc:mysql://localhost:3306/ova_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Properties
ova.app.jwtSecret=SecretKeyToGenJWTsSecretKeyToGenJWTsSecretKeyToGenJWTsSecretKeyToGenJWTs
ova.app.jwtExpirationMs=86400000

# Seed accounts
app.seed.admin-password=${SEED_ADMIN_PASSWORD:admin123}
app.seed.voter-password=${SEED_VOTER_PASSWORD:user12345}
app.seed.candidate-password=${SEED_CANDIDATE_PASSWORD:candidate123}

# Server port
server.port=8181
